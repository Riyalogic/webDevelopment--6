<body>
    <h2>Pizza Order Form</h2>
    <p>First Name: <input type="text"></p>

    <p>Contact Number: <input type="number"></p>
    <p>Preferred Delivery Date: <input type="date"></p>
    <p>Size:</p>
    <input type="radio" name="Size" value="Small">
    <span>Small</span>
    <input type="radio" name="Size" value="Medium">
    <span>Medium</span>
    <input type="radio" name="Size" value="Large">
    <span>Large</span>
    <p>Flavor:</p>
    <p><input type="checkbox" >
    <span>Hawaiian(Php 150.00)</span>
    <select name="" id=""></select>
    </p>
    <p><input type="checkbox">
    <span>Pepperoni(Php 140.00)</span>
    <select name="" id=""></select>
    </p>
    <p><input type="checkbox">
    <span>Vegetable(Php 130.00)</span>
    <select name="" id=""></select>
    </p>
    <p>Credit Card Number: <input type="text"></p>
    <p>PIN: <input type="number"></p>
    <p>Additional Note: <textarea name="note" id="note"></textarea></p>
    <button>Submit Order</button>
</body>
</html>
