<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow p-4">
                    <h2 class="text-center mb-4">Electricity Bill Calculator</h2>
                    <div class="mb-3"> 
                        <label class="form-label">
                            Electricity Units
                        </label>
                        <input type="number"id="Units" class="form-control" placeholder="Enter Units">
                    </div class="d-flex gap-2"> 
                    <BUtton class="btn btn-primary w-50" onclick="calculateBill()">Calculate</BUtton>
                    <button class="btn btn- w-50" onclick="resetBill()">Reset</button>
                </div>
                <div class="card mt-4 p-3 result" id="result">
                    <h4 class="mb-3">Bill Details</h4>
                    <p id="slab1"></p>
                    <p id="slab2"></p>
                    <p id="slab3"></p>
                    <p id="slab4"></p>
                    <hr>
                    <p id="subtotal"></p>
                    <p id="surcharge"></p>
                    <h5 id="total"></h5>

                </div>
            </div>
        </div>
    </div>
</div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin
    ></script>
    <script src="script.js"></script>
</body>
</html>
