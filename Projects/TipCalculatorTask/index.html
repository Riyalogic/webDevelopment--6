<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="calculator p-4">
            <h2 class="text-center mb-4">Tip Calculator</h2>
            <div class="mb-3">
                <label class="form-label">Bill Amount</label>
                <input type="number" id="billAmount" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">How was the service</label>
                <select id="service" class="form-select">
                    <option value="">Select</option>
                    <option value="0.25">25% - Top Notch</option>
                    <option value="0.20">20% - Excellent </option>
                    <option value="0.15">15% - Good</option>
                    <option value="0.10">10% - Bad</option>
                    <option value="0.5">5% - Worst</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Total number of Persons</label>
                <input type="number" id="persons" class="form-control" placeholder="Enter number of persons">
            </div>
            <button class="btn btn-primary w-100" onclick="calculateTip()">
                Calculate
            </button>
            <div class="result mt-4 text-center" id="result">
                <h4>Each Person Pays</h4>
                <h2 id="amount">₹</h2>
            </div>
        </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin
    ></script>
    <script src="script.js"></script>
  </body>
</html>
