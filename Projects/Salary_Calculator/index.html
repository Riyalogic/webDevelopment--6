<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container mt-5">
        <div class="card p-4 shadow w-50 mx-auto">
            <h2 class="text-center mb-4">
                Salary Calculator
            </h2>
            <label class="form-label">Basic Salary</label>
            <input type="number" id="salary" class="form-control" placeholder=" Enter Basic Salary">
            <div class="mt-3 d-flex gap-2">
                <button class="btn btn-primary w-50" id="btn">Calculate</button>
                <button class="btn btn-primary w-50" onclick="resetData()">Reset</button>
            </div>
            <div id="success" class="alert alert-success mt-3 d-none">Salary Calculated Successfully</div>
            <div id="result" class="card p-3 d-none">
                <p id="basic"></p>
                <p id="hra"></p>
                <p id="da"></p>
                <h5 id="gross"></h5>
            </div>
        </div>
    </div>
     <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin
    ></script>
    <script src="script.js"></script>
</body>
</html>
